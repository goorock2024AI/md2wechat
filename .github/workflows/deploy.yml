name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          node-version: '24'
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Clone original Markdown2Html
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/shenweiyan/Markdown2Html.git original

      - name: Replace with original source
        run: |
          rm -rf src config scripts public *.js
          cp -r /tmp/original/src ./src
          cp -r /tmp/original/config ./config
          cp -r /tmp/original/scripts ./scripts
          cp -r /tmp/original/public ./public
          cp /tmp/original/main.js ./main.js
          cp /tmp/original/watch.js ./watch.js
          cp /tmp/original/package.json ./package.json
          # 保留 yarn.lock 让 npm ci 可以工作
          cp /tmp/original/yarn.lock ./yarn.lock

      - name: Update repository info
        run: |
          sed -i 's/"name": "markdown2wechat"/"name": "md2wechat"/' package.json
          sed -i 's|"url": "https://github.com/TaleAi/markdown2html"|"url": "https://github.com/goorock2024AI/md2wechat"|' package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (use China npm mirror)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci || npm install

      - name: Build
        run: npm run build
        env:
          GENERATE_SOURCEMAP: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
          retention-days: 7